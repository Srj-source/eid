<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Mubarak - Image Gallery</title>
    
    <!-- GSAP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* GSAP Loader Styles */
        #gsap-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0c1a33, #1a2b4a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
        }
        
        .loader-bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            z-index: -1;
        }
        
        .loader-content {
            text-align: center;
            color: #ffd700;
            position: relative;
            z-index: 1;
        }
        
        .loader-logo {
            font-size: 5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: logoGlow 3s infinite alternate;
        }
        
        @keyframes logoGlow {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1.1); text-shadow: 0 0 30px rgba(255, 215, 0, 1); }
        }
        
        .loader-text {
            font-family: 'Amiri', serif;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        .loader-animation {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
        }
        
        .loader-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
        
        .loader-progress-container {
            width: 300px;
            margin: 0 auto 20px;
        }
        
        .loader-progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .loader-progress {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            transition: width 0.3s ease;
        }
        
        .loader-message {
            margin-top: 20px;
            font-size: 1em;
            color: rgba(255, 255, 255, 0.8);
            min-height: 24px;
        }
        
        .floating-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .floating-star {
            position: absolute;
            font-size: 20px;
            color: #ffd700;
            opacity: 0;
        }
        
        /* Hide main content initially */
        body > *:not(#gsap-loader) {
            opacity: 0;
        }
        
        /* Rest of your existing styles */
        body {
            font-family: 'Poppins', sans-serif;
            transition: background 1s ease-in-out;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1f2a44, #2e3b5e);
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #1f2a44, #2e3b5e);
            color: #ffd700;
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: fadeInDown 1.5s ease;
            overflow: hidden;
        }
        
        @media (min-width: 667px) {
            header {
                background: url('hero.jpg') no-repeat center center;
                background-size: cover;
                padding: 100px 20px;
            }
        }
        
        /* Star Styling */
        .star {
            position: absolute;
            font-size: 18px;
            color: #ffd700;
            cursor: pointer;
            animation: twinkle 2s infinite alternate;
            transition: transform 0.3s ease-in-out;
        }
        
        /* Twinkling Effect */
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .star:hover {
            transform: scale(1.2);
        }
        
        header h1 {
            font-family: 'Amiri', serif;
            font-size: 4em;
            text-shadow: 3px 3px 10px rgba(255, 215, 0, 0.8);
        }
        
        header p {
            font-size: 1.5em;
            text-shadow: 1px 1px 5px rgba(255, 215, 0, 0.6);
        }
        
        header::before {
            content: "🌙";
            font-size: 100px;
            position: absolute;
            top: -20px;
            left: 10%;
            animation: moonGlow 2s infinite alternate;
        }
        
        @keyframes moonGlow {
            from { opacity: 0.7; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1); }
        }
        
        /* Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 15px;
        }
        
        .image-container {
            position: relative;
            width: 200px;
            height: 200px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .image-container:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        
        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            animation: zoomIn 0.3s ease;
        }
        
        /* Animated Glowing Boundary for Lightbox Image */
        .lightbox-content {
            animation: glowHeart 2s infinite alternate, zoomIn 0.3s ease;
            border-radius: 15px;
            border: 10px solid transparent;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #8b5cf6, #00d4ff);
            background-clip: padding-box;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            position: relative;
        }
        
        /* Add a Shimmering Effect to the Border */
        .lightbox-content::before {
            content: "";
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #8b5cf6, #00d4ff);
            background-size: 300% 300%;
            animation: shimmer 6s infinite linear;
            z-index: -1;
        }
        
        /* Shimmer Animation */
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Glowing Animation */
        @keyframes glowHeart {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.7); }
            100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.7); }
        }
        
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close:hover {
            color: #e74c3c;
        }
        
        .caption {
            color: #fff;
            font-size: 1.2em;
            margin-top: 10px;
        }
        
        /* Footer */
        footer {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #ffd700;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.3);
            font-size: 1.2em;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.7);
        }
        
        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
        
        /* Emoji Animation */
        .emoji {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 2s forwards;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // GSAP Loader Animation
        document.addEventListener('DOMContentLoaded', function() {
            // Create floating stars
            createFloatingStars();
            
            // Animate the loader dots
            gsap.to('.loader-dot', {
                y: -30,
                stagger: 0.2,
                repeat: -1,
                yoyo: true,
                duration: 0.8,
                ease: "power2.inOut"
            });
            
            // Track loading progress
            const progressBar = document.getElementById('loader-progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const messageElement = document.getElementById('loader-message');
            
            const messages = [
                "Preparing blessings...",
                "Loading spiritual journey...",
                "Arranging prayers...",
                "Gathering quotes...",
                "Final preparations...",
                "Ready for blessings!"
            ];
            
            // Track resources to load
            const resources = [
                // Images
                'A1.jpg', 'A2.jpg', 'A3.jpg', 'A4.jpg', 'A5.jpg', 
                'A6.jpg', 'A7.jpg', 'A8.jpg', 'A9.jpg', 'A10.jpg',
                'A11.jpg', 'A12.jpg', 'A13.jpg', 'A14.jpg', 'A15.jpg',
                'A16.jpg', 'A17.jpg', 'A18.jpg', 'A19.jpg', 'A20.jpg',
                'A21.jpg', 'A22.jpg', 'A23.gif', 'A24.gif', 'A25.gif',
                'A26.jpg', 'A27.jpg', 'A28.gif', 'A29.jpg', 'A30.gif',
                // Audio
                'Aaa1.mp3',
                // External scripts (simulate)
                'backgroundcolor.js', 'function createHeart.js', 'security.js',
                'Lightbox functionality.js', 'audio.js', 'star-msg.js', 'p.message.js'
            ];
            
            let loadedCount = 0;
            let totalResources = resources.length;
            let progress = 0;
            
            // Function to update progress
            function updateProgress() {
                loadedCount++;
                progress = Math.min(100, Math.round((loadedCount / totalResources) * 100));
                
                // Update progress bar
                gsap.to(progressBar, {
                    width: `${progress}%`,
                    duration: 0.5,
                    ease: "power2.out"
                });
                
                // Update percentage text
                progressPercent.textContent = `${progress}%`;
                
                // Update message based on progress
                if (progress < 20) {
                    messageElement.textContent = messages[0];
                } else if (progress < 40) {
                    messageElement.textContent = messages[1];
                } else if (progress < 60) {
                    messageElement.textContent = messages[2];
                } else if (progress < 80) {
                    messageElement.textContent = messages[3];
                } else if (progress < 100) {
                    messageElement.textContent = messages[4];
                } else {
                    messageElement.textContent = messages[5];
                }
                
                // When all resources are loaded
                if (loadedCount >= totalResources) {
                    setTimeout(completeLoading, 1000);
                }
            }
            
            // Simulate loading external resources
            function simulateResourceLoading() {
                // For actual implementation, you would check if each resource is loaded
                // For this example, we'll simulate loading with random intervals
                resources.forEach((resource, index) => {
                    setTimeout(() => {
                        updateProgress();
                    }, Math.random() * 3000 + 500 * index);
                });
            }
            
            // Complete loading process
            function completeLoading() {
                // Animate loader exit
                gsap.to('#gsap-loader', {
                    opacity: 0,
                    duration: 1.5,
                    ease: "power2.inOut",
                    onComplete: function() {
                        document.getElementById('gsap-loader').style.display = 'none';
                        
                        // Animate main content in
                        gsap.to('body > *:not(#gsap-loader)', {
                            opacity: 1,
                            duration: 1,
                            stagger: 0.1,
                            ease: "power2.out"
                        });
                        
                        // Start background music if needed
                        const bgMusic = document.getElementById('bg-music');
                        if (bgMusic) {
                            bgMusic.volume = 0.5;
                            // Note: Autoplay might be blocked by browsers without user interaction
                        }
                    }
                });
            }
            
            // Start loading simulation
            simulateResourceLoading();
            
            // Create floating stars for loader background
            function createFloatingStars() {
                const starsContainer = document.getElementById('floating-stars');
                const starCount = 15;
                
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'floating-star';
                    star.innerHTML = '★';
                    
                    // Random position
                    const left = Math.random() * 100;
                    const top = Math.random() * 100;
                    star.style.left = `${left}%`;
                    star.style.top = `${top}%`;
                    
                    // Random delay and duration
                    const delay = Math.random() * 5;
                    const duration = 3 + Math.random() * 4;
                    
                    // GSAP animation for floating stars
                    gsap.to(star, {
                        opacity: 1,
                        y: -100,
                        rotation: 360,
                        duration: duration,
                        delay: delay,
                        repeat: -1,
                        ease: "sine.inOut"
                    });
                    
                    starsContainer.appendChild(star);
                }
            }
        });
        
        // Your existing confetti code
        document.addEventListener("click", function(event) {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight }
            });
        });
        
        // Your existing emoji animation code
        const emojis = ["❤️", "💖", "💘", "😊", "😘", "💞", "🥰", "🌸"];
        
        document.addEventListener("click", function(event) {
            for (let i = 0; i < 3; i++) {
                createEmoji(event.clientX, event.clientY);
            }
        });
        
        function createEmoji(x, y) {
            const emoji = document.createElement("div");
            emoji.classList.add("emoji");
            emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            
            emoji.style.left = (x + Math.random() * 30 - 15) + "px";
            emoji.style.top = (y + Math.random() * 30 - 15) + "px";
            
            emoji.style.animationDuration = (1.5 + Math.random() * 1.5) + "s";
            
            document.body.appendChild(emoji);
            
            setTimeout(() => { emoji.remove(); }, 2000);
        }
        
        // Simple lightbox functionality for demo
        document.querySelectorAll('.image-container').forEach(container => {
            container.addEventListener('click', function() {
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                const caption = document.querySelector('.caption');
                
                lightboxImg.src = this.querySelector('img').src;
                caption.textContent = this.querySelector('img').alt;
                lightbox.style.display = 'block';
            });
        });
        
        document.querySelector('.close').addEventListener('click', function() {
            document.getElementById('lightbox').style.display = 'none';
        });
    </script>
