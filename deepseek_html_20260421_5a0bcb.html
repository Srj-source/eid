<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Ramadan Mubarak • Enchanted Gallery ✨</title>
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ===== MODERN RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFD700;
            --deep-blue: #0f172a;
            --moon-glow: #fef3c7;
            --accent-rose: #fb7185;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 25px 35px -10px rgba(0, 0, 0, 0.4);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 30% 10%, #1e293b, #0b1120);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            opacity: 1 !important; /* override old loader opacity */
        }

        /* Animated Background overlay (stars + nebula) */
        .cosmic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><circle cx="200" cy="150" r="1.5" fill="%23fff" opacity="0.7"/><circle cx="800" cy="300" r="2" fill="%23FFD700" opacity="0.6"/><circle cx="1000" cy="600" r="1.8" fill="%23fff" opacity="0.5"/><circle cx="400" cy="700" r="2.2" fill="%23fbbf24" opacity="0.5"/></svg>');
            background-size: cover;
            animation: slowDrift 28s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -1%); }
        }

        /* ===== GSAP LOADER (ENHANCED) ===== */
        #gsap-loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 20%, #1e293b, #020617);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }
        .loader-logo {
            font-size: 5.5rem;
            filter: drop-shadow(0 0 20px gold);
            animation: floatLogo 2s infinite alternate;
        }
        @keyframes floatLogo {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-12px) rotate(5deg); }
        }
        .loader-text {
            font-family: 'Amiri Quran', serif;
            font-size: 3rem;
            background: linear-gradient(45deg, #fbbf24, #fcd34d, #fffbeb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 25px;
            letter-spacing: 5px;
        }
        .loader-progress {
            width: 260px;
            height: 8px;
            background: rgba(255,215,0,0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 15px #ffd70055;
        }
        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fbbf24, #ffed4a, #fcd34d);
            border-radius: 20px;
            box-shadow: 0 0 20px #fbbf24;
        }

        /* ===== HEADER — MAJESTIC ===== */
        header {
            position: relative;
            padding: 80px 20px 70px;
            text-align: center;
            overflow: hidden;
            isolation: isolate;
        }
        header::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(255,215,0,0.15), transparent 70%);
            z-index: -1;
        }
        header h1 {
            font-family: 'Amiri Quran', serif;
            font-size: clamp(3.2rem, 12vw, 5.8rem);
            background: linear-gradient(135deg, #fef9c3, #fde047, #fef08a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #ffd700;
            letter-spacing: 6px;
            animation: titlePulse 3s infinite alternate;
        }
        @keyframes titlePulse {
            0% { text-shadow: 0 0 15px #fbbf24; letter-spacing: 5px; }
            100% { text-shadow: 0 0 40px #fcd34d, 0 0 60px #fffbeb; letter-spacing: 9px; }
        }
        header p {
            font-size: 1.5rem;
            font-weight: 300;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            background: var(--glass-bg);
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* Floating lanterns / stars in header */
        .floating-ornament {
            position: absolute;
            font-size: 2.8rem;
            opacity: 0.5;
            pointer-events: none;
            animation: floatOrnament 7s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 8px gold);
        }
        @keyframes floatOrnament {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-25px) rotate(10deg); }
        }

        /* ===== GALLERY — TILT & SMOOTH TRANSITIONS ===== */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 30px 20px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .image-container {
            position: relative;
            width: 210px;
            height: 210px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.5);
            transition: all 0.4s var(--transition-bounce);
            cursor: pointer;
            border: 2px solid rgba(255,215,0,0.2);
            transform-style: preserve-3d;
            perspective: 800px;
            will-change: transform;
        }

        .image-container:hover {
            transform: scale(1.08) rotate(0.5deg) translateY(-8px);
            box-shadow: 0 0 30px #fbbf24, 0 20px 35px -5px black;
            border-color: var(--gold);
            transition: all 0.25s var(--transition-bounce);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: block;
        }

        .image-container:hover img {
            transform: scale(1.1) rotate(1deg);
        }

        /* glass overlay */
        .image-container::after {
            content: "🌙";
            position: absolute;
            bottom: 8px; right: 8px;
            font-size: 22px;
            opacity: 0;
            transition: 0.3s;
            filter: drop-shadow(0 0 6px black);
        }
        .image-container:hover::after {
            opacity: 1;
        }

        /* ===== LIGHTBOX — CINEMATIC ===== */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 32px;
            border: 3px solid rgba(255,215,0,0.7);
            box-shadow: 0 0 60px #fbbf24, 0 20px 40px black;
            animation: lightboxZoom 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            transition: transform 0.2s;
            background: #00000030;
        }
        @keyframes lightboxZoom {
            0% { opacity: 0; transform: scale(0.7) rotate(-2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        .close {
            position: absolute;
            top: 25px; right: 40px;
            color: #ffd700;
            font-size: 50px;
            font-weight: 300;
            cursor: pointer;
            z-index: 2001;
            text-shadow: 0 0 20px gold;
            transition: 0.2s;
        }
        .close:hover {
            color: #fff7b0;
            transform: scale(1.2) rotate(90deg);
        }
        .caption {
            margin-top: 18px;
            color: #fef9c3;
            font-size: 1.5rem;
            font-weight: 400;
            text-shadow: 0 0 10px black;
            letter-spacing: 2px;
        }

        /* ===== UNIQUE FEATURE: DUA OF THE MOMENT ===== */
        .dua-section {
            max-width: 900px;
            margin: 25px auto 10px;
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            border: 1px solid #fbbf2466;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 10px 25px -5px #00000080;
        }
        .dua-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .dua-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 10px #fcd34d);
        }
        #dua-text {
            font-family: 'Cairo', sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fffbeb;
            text-shadow: 0 2px 8px black;
            max-width: 600px;
        }
        .dua-btn {
            background: linear-gradient(145deg, #fbbf24, #b45309);
            border: none;
            color: #0f172a;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 20px #f59e0b;
            transition: 0.2s;
            border: 1px solid #fffbeb;
        }
        .dua-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px #fcd34d;
            background: #fde047;
        }

        /* Footer */
        footer {
            background: transparent;
            padding: 30px 0 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border-top: 1px solid #fbbf2433;
            margin-top: 30px;
            color: #fde68a;
        }

        /* Hearts & Emojis (enhanced) */
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 28px;
            color: #ff4d6d;
            filter: drop-shadow(0 0 15px #ffb3c1);
            animation: floatHeart 4s infinite cubic-bezier(0.5, 0, 0.75, 0);
            pointer-events: none;
            z-index: 999;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
        }

        /* 3D Tilt effect on containers (JS will add) */
        .tilt-active {
            transition: transform 0.1s ease;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .image-container { width: 150px; height: 150px; }
            .dua-section { flex-direction: column; gap: 15px; text-align: center; }
        }

        /* Star messages (keep original) */
        .star {
            position: absolute;
            font-size: 24px;
            cursor: pointer;
            filter: drop-shadow(0 0 8px gold);
            animation: twinkle 2.5s infinite alternate;
            z-index: 5;
        }
        @keyframes twinkle {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <!-- COSMIC BACKGROUND -->
    <div class="cosmic-bg"></div>

    <!-- GSAP LOADER (fancy) -->
    <div id="gsap-loader">
        <div class="loader-content">
            <div class="loader-logo">🌙✨</div>
            <div class="loader-text">Ramadan Kareem</div>
            <div class="loader-animation" style="display: flex; gap: 12px; margin: 10px 0;">
                <div class="loader-dot" style="background:#fbbf24; width:16px; height:16px;"></div>
                <div class="loader-dot" style="background:#fcd34d; width:16px; height:16px;"></div>
                <div class="loader-dot" style="background:#fffbeb; width:16px; height:16px;"></div>
            </div>
            <div class="loader-progress">
                <div class="loader-progress-bar"></div>
            </div>
            <div class="loader-message" style="margin-top: 22px; color: #fde68a;">gathering blessings...</div>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div id="stars-container"></div>
        <!-- Floating ornaments -->
        <div class="floating-ornament" style="top: 15%; left: 5%;">🕌</div>
        <div class="floating-ornament" style="bottom: 20%; right: 8%; font-size: 3.5rem;">🌟</div>
        <div class="floating-ornament" style="top: 40%; right: 15%;">✨</div>
        <h1>Ramadan Mubarak</h1>
        <p>🌙 Blessed Month of Light & Reflection 🌙</p>
    </header>

    <!-- DUA OF THE MOMENT — UNIQUE FEATURE -->
    <div class="dua-section">
        <div class="dua-box">
            <span class="dua-icon">🤲</span>
            <span id="dua-text">اللهم إنك عفو تحب العفو فاعف عنا</span>
        </div>
        <button class="dua-btn" id="newDuaBtn"><i class="fas fa-sync-alt"></i> New Dua</button>
    </div>

    <!-- LOVE MESSAGE (random) -->
    <div id="love-message" style="text-align: center; margin: 20px auto; font-size: 1.5rem; color: #fde68a; text-shadow: 0 0 15px; padding: 0 20px;"></div>

    <!-- GALLERY -->
    <div class="gallery" id="mainGallery">
        <!-- image containers (same as original but enhanced) -->
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="">
        <div class="caption"></div>
    </div>

    <footer>
        <p>✨ All rights reserved by suraj kr 😅 • Ramadan 1446 ✨</p>
    </footer>

    <!-- AUDIO -->
    <audio id="bg-music" loop>
        <source src="Aaa1.mp3" type="audio/mpeg">
    </audio>

    <!-- External libs -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ========================
        // GLOBAL DATA & PRESERVE SPECIALIZATIONS
        // ========================
        const imageList = [
            "A1.jpg","A2.jpg","A3.jpg","A4.jpg","A5.jpg","A6.jpg","A7.jpg","A8.jpg","A9.jpg","A10.jpg",
            "A11.jpg","A12.jpg","A13.jpg","A14.jpg","A15.jpg","A16.jpg","A17.jpg","A18.jpg","A19.jpg","A20.jpg",
            "A21.jpg","A22.jpg","A23.gif","A24.gif","A25.gif","A26.jpg","A27.jpg","A28.gif","A29.jpg","A30.gif"
        ];
        
        // populate gallery
        const galleryDiv = document.getElementById('mainGallery');
        imageList.forEach((src, idx) => {
            const container = document.createElement('div');
            container.className = 'image-container';
            container.setAttribute('data-src', src);
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Day${idx+1}`;
            img.loading = 'lazy';
            container.appendChild(img);
            galleryDiv.appendChild(container);
        });

        // Special link for last image
        document.querySelectorAll('.image-container').forEach((cont, i) => {
            if (i === 29) { // A30.gif
                cont.addEventListener('click', (e) => {
                    window.open('https://aaaaaaajhsjsfwjgw.my.canva.site/cc03', '_blank');
                });
            }
        });

        // Stars messages (keep original)
        const messages = [
            "saiba, you are the brightest star in my sky! ✨", "Every night, I wish upon a star for you. 💖",
            "Like the moon in Ramadan, you illuminate my world. 🌙", "You are my dua come true, my love. ❤️",
            "I love you more than all the stars in the sky. 🌟", "My heart twinkles for you, just like these stars. ✨",
            "You are the moon to my Ramadan nights. 🌙", "Every prayer I make, I thank Allah for you. 💕",
            "Like the crescent moon, my love for you grows each day. 🥰", "saiba, you are the Noor of my heart. 💖"
        ];
        
        function createStars() {
            const starsContainer = document.getElementById("stars-container");
            for (let i = 0; i < 10; i++) {
                let star = document.createElement("div");
                star.classList.add("star");
                star.innerText = "⭐";
                star.style.left = Math.random() * 90 + "%";
                star.style.top = Math.random() * 70 + "%";
                star.onclick = function() {
                    alert(messages[Math.floor(Math.random() * messages.length)]);
                };
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Love message random
        const messges = [
            "You are the moon to my Ramadan nights. 🌙", "Every prayer I make, I thank Allah for you. 💕",
            "saiba, you are the Noor of my heart. 💖", "You are my Eid after every hardship. 🎉💕",
            "Loving you is like performing Tawaf—pure, beautiful, endless. 🤍"
        ];
        document.getElementById("love-message").innerText = messges[Math.floor(Math.random() * messges.length)];

        // Lightbox (enhanced)
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.querySelector('.caption');
        const closeBtn = document.querySelector('.close');

        document.querySelectorAll('.image-container').forEach(container => {
            container.addEventListener('click', (e) => {
                if (container.querySelector('img').alt.includes('Day30')) return; // handled
                lightbox.classList.add('active');
                lightboxImg.src = container.getAttribute('data-src');
                lightboxCaption.textContent = container.querySelector('img').alt;
                gsap.fromTo(lightboxImg, { scale: 0.85, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.2)" });
            });
        });
        closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('active'); });

        // ===== UNIQUE FEATURE: DUA GENERATOR =====
        const duas = [
            "اللهم بلغنا رمضان وأعنا على صيامه وقيامه", "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً",
            "اللهم إنك عفو تحب العفو فاعف عنا", "اللهم اجعلنا من عتقائك من النار", "اللهم بارك لنا في شعبان وبلغنا رمضان",
            "رب اشرح لي صدري ويسر لي أمري", "اللهم إني أسألك الجنة وما قرب إليها", "سبحان الله وبحمده عدد خلقه"
        ];
        const duaText = document.getElementById('dua-text');
        document.getElementById('newDuaBtn').addEventListener('click', () => {
            duaText.style.opacity = '0';
            setTimeout(() => {
                duaText.innerText = duas[Math.floor(Math.random() * duas.length)];
                duaText.style.opacity = '1';
                gsap.fromTo(duaText, { scale: 0.9 }, { scale: 1, duration: 0.3 });
            }, 100);
            confetti({ particleCount: 40, spread: 50, origin: { x: 0.5, y: 0.5 } });
        });

        // Hearts (keep)
        function createHeart() {
            const heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.classList.add("heart");
            heart.style.left = Math.random() * window.innerWidth + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
        setInterval(createHeart, 600);

        // Emoji on click
        const emojis = ["❤️", "💖", "💘", "😊", "🥰", "🌸", "✨", "🌟"];
        document.addEventListener("click", function(event) {
            for (let i=0; i<3; i++) {
                const emoji = document.createElement("div");
                emoji.classList.add("emoji");
                emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
                emoji.style.left = (event.clientX + Math.random()*40-20) + "px";
                emoji.style.top = (event.clientY + Math.random()*40-20) + "px";
                emoji.style.position = "fixed";
                emoji.style.fontSize = "32px";
                emoji.style.animation = "flotUp 2s ease-out forwards";
                emoji.style.pointerEvents = "none";
                emoji.style.zIndex = 999;
                document.body.appendChild(emoji);
                setTimeout(() => emoji.remove(), 2000);
            }
            confetti({ particleCount: 60, spread: 60, origin: { x: event.clientX/window.innerWidth, y: event.clientY/window.innerHeight } });
        });

        // Background color animation (original but improved)
        const colors = ["#0b132b", "#1c2541", "#2c3a5e", "#1f2a44"];
        let i = 0;
        setInterval(() => {
            document.body.style.transition = "background 3s";
            document.body.style.background = `radial-gradient(circle at 30% 20%, ${colors[i]}, #020617)`;
            i = (i+1) % colors.length;
        }, 4500);

        // 3D Tilt effect for image containers (extra unique)
        document.querySelectorAll('.image-container').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width/2;
                const centerY = rect.height/2;
                const rotateX = (y - centerY) / 12;
                const rotateY = (centerX - x) / 12;
                card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05) translateY(-8px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });

        // ===== GSAP LOADER & ENTRANCE =====
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to('.loader-dot', { y: -18, stagger: 0.15, repeat: -1, yoyo: true, duration: 0.5 });
            
            const progressBar = document.querySelector('.loader-progress-bar');
            const msgEl = document.querySelector('.loader-message');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 12;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    gsap.to('#gsap-loader', { opacity: 0, duration: 1.2, onComplete: () => {
                        document.getElementById('gsap-loader').style.display = 'none';
                        // Animate content
                        gsap.fromTo('header', { y: -60, opacity: 0 }, { y: 0, opacity: 1, duration: 1.2, ease: "elastic.out(1,0.5)" });
                        gsap.fromTo('.gallery .image-container', { scale: 0.7, opacity: 0, y: 30 }, { scale: 1, opacity: 1, y: 0, stagger: 0.04, duration: 0.8, ease: "back.out(1.7)" });
                        gsap.fromTo('.dua-section', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1 });
                        // music
                        const audio = document.getElementById('bg-music');
                        audio.volume = 0.3;
                        audio.play().catch(()=>{});
                    }});
                }
                gsap.to(progressBar, { width: progress+'%', duration: 0.3 });
                if (progress>30) msgEl.innerText = 'preparing serenity...';
                if (progress>70) msgEl.innerText = 'almost blessed ✨';
            }, 250);
        });

        // Anti-right-click etc (preserved)
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.addEventListener("keydown", (e) => { if (e.ctrlKey && ["i","j","u","s","p"].includes(e.key.toLowerCase())) e.preventDefault(); });
        ['copy','cut','dragstart'].forEach(ev => document.addEventListener(ev, e => e.preventDefault()));
        
        // Style for emoji animation
        const style = document.createElement('style');
        style.innerHTML = `@keyframes flotUp { 0% { transform: translateY(0) scale(0.8); opacity:1; } 100% { transform: translateY(-120px) scale(1.3); opacity:0; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
